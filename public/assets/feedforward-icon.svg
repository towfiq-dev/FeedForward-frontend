<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>FeedForward icon</title>
  <desc>A dark rounded badge containing a leaf that flows into a forward arrow.</desc>
  <defs>
    <linearGradient id="badgeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B3B2A"/>
      <stop offset="100%" stop-color="#04140D"/>
    </linearGradient>
    <linearGradient id="leafGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#15803D"/>
      <stop offset="100%" stop-color="#4ADE80"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="200" height="200" rx="46" fill="url(#badgeGrad2)"/>

  <path d="M100 156
           C 60 156, 40 128, 40 94
           C 40 94, 70 100, 88 80
           C 106 100, 136 94, 136 94
           C 136 128, 116 156, 100 156 Z"
        fill="url(#leafGrad2)"/>
  <path d="M100 156 L100 84" stroke="#04140D" stroke-width="5" stroke-linecap="round" fill="none"/>

  <path d="M118 66 L152 50 L118 34" fill="none" stroke="#FBBF24" stroke-width="10"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
